<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Brand — Wishlist</title>
    <link rel="icon" type="image/png" href="../Img/logo.png" />
    <script>
      tailwind.config = {
        theme: {
          extend: { fontFamily: { brand: ['"Cormorant Garamond"', "serif"] } },
        },
      };
    </script>
  </head>
  <body class="font-sans bg-[#faf8f7]">
    <!-- Navbar -->
    <nav
      class="bg-[#fdfcfb] fixed w-full z-20 top-0 start-0 border-b border-[#f0e6e0]"
    >
      <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-6 py-3"
      >
        <a href="../index.html" class="flex items-center space-x-3">
          <img src="../Img/logo.png" class="h-12" alt="Brand Logo" />
          <span
            class="font-brand font-medium text-[1.6rem] tracking-[0.12em] text-neutral-800"
            >Brand</span
          >
        </a>
        <button
          id="menu-toggle"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-neutral-500 rounded md:hidden hover:bg-neutral-100 focus:outline-none"
        >
          <svg
            class="w-6 h-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="1.5"
              d="M5 7h14M5 12h14M5 17h14"
            />
          </svg>
        </button>
        <div
          class="hidden w-full md:flex md:w-auto md:items-center md:gap-8"
          id="navbar-default"
        >
          <ul
            class="flex flex-col md:flex-row md:items-center md:gap-7 mt-4 md:mt-0"
          >
            <li>
              <a
                href="../index.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Home</a
              >
            </li>
            <li>
              <!-- ✅ تم التصحيح: كانت href="#" -->
              <a
                href="../About/about.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >About</a
              >
            </li>
            <li>
              <a
                href="../product/product.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Products</a
              >
            </li>
            <li>
              <a
                href="../sales/sales.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Sales</a
              >
            </li>
            <li>
              <a
                href="../ContactUs/contact.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Contact</a
              >
            </li>
          </ul>
          <div class="hidden md:block w-px h-6 bg-neutral-200"></div>
          <div class="flex items-center gap-5 mt-4 md:mt-0">
            <!-- Wishlist -->
            <a
              href="wishlist.html"
              class="relative text-neutral-500 hover:text-[#d4847a] transition-colors duration-200 cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-[22px] h-[22px]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              <span
                id="wishBadge"
                class="absolute -top-1.5 -right-1.5 bg-[#d4847a] text-white text-[0.6rem] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none"
                >0</span
              >
            </a>
            <!-- Cart -->
            <a
              href="cart.html"
              class="relative text-neutral-500 hover:text-[#d4847a] transition-colors duration-200 cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-[22px] h-[22px]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"
                />
              </svg>
              <span
                id="cartBadge"
                class="absolute -top-1.5 -right-1.5 bg-[#d4847a] text-white text-[0.6rem] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none"
                >0</span
              >
            </a>
            <button
              id="authBtn"
              class="font-brand font-medium tracking-[0.1em] text-[0.95rem] border border-[#d4847a] text-[#d4847a] hover:bg-[#d4847a] hover:text-white transition-all duration-300 px-5 py-1.5 rounded-sm cursor-pointer"
            >
              Sign Up
            </button>
          </div>
        </div>
      </div>
    </nav>
    <div class="h-20"></div>

    <!-- Wishlist Content -->
    <div class="max-w-screen-lg mx-auto px-4 md:px-8 py-12">
      <h1
        class="font-brand font-semibold text-[2rem] sm:text-[2.5rem] tracking-wide text-neutral-800 mb-2"
      >
        My Wishlist
      </h1>
      <p id="wishSubtitle" class="font-sans text-sm text-neutral-400 mb-10"></p>

      <!-- Empty state -->
      <div id="emptyWish" class="hidden text-center py-24">
        <svg
          class="w-16 h-16 text-neutral-200 mx-auto mb-4"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
        <p class="font-brand text-2xl text-neutral-400 mb-4">
          Your wishlist is empty
        </p>
        <a
          href="../product/product.html"
          class="inline-block font-brand font-medium tracking-[0.1em] text-[1rem] bg-[#d4847a] text-white hover:bg-[#c27268] transition-all duration-300 px-8 py-2.5 rounded-sm"
        >
          Discover Products
        </a>
      </div>

      <!-- Wishlist grid -->
      <div
        id="wishGrid"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5"
      ></div>

      <!-- Clear all -->
      <div id="wishActions" class="hidden mt-10 flex justify-end">
        <button
          onclick="clearWishlist()"
          class="font-brand font-medium tracking-[0.08em] text-[0.95rem] border border-neutral-300 text-neutral-500 hover:border-red-300 hover:text-red-400 transition-all duration-300 px-6 py-2.5 rounded-sm"
        >
          Clear Wishlist
        </button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-[#fdfcfb] border-t border-[#f0e6e0] mt-10">
      <div
        class="container px-5 py-12 mx-auto flex md:items-start md:flex-row md:flex-nowrap flex-wrap flex-col gap-10"
      >
        <div class="w-56 flex-shrink-0">
          <a href="#" class="flex items-center gap-2">
            <img src="../Img/logo.png" class="h-8" alt="Brand Logo" />
            <span
              class="font-brand font-medium text-[1.3rem] tracking-[0.1em] text-neutral-800"
              >Brand</span
            >
          </a>
          <p class="mt-3 text-sm text-neutral-500 leading-relaxed">
            Your go-to destination for timeless women's fashion.
          </p>
        </div>
        <div class="flex-grow flex flex-wrap md:pr-10 md:text-left text-center">
          <div class="lg:w-1/4 md:w-1/2 w-full px-4 mb-8">
            <h2
              class="font-brand font-medium tracking-widest text-neutral-800 text-base mb-4"
            >
              <span class="inline-block border-b border-[#d4847a] pb-1">Shop</span>
            </h2>
            <nav class="flex flex-col gap-2">
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">New Arrivals</a>
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">Best Sellers</a>
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">Sale & Offers</a>
            </nav>
          </div>
          <div class="lg:w-1/4 md:w-1/2 w-full px-4 mb-8">
            <h2
              class="font-brand font-medium tracking-widest text-neutral-800 text-base mb-4"
            >
              <span class="inline-block border-b border-[#d4847a] pb-1">Help</span>
            </h2>
            <nav class="flex flex-col gap-2">
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">Shipping & Returns</a>
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">Size Guide</a>
              <a href="#" class="text-sm text-neutral-500 hover:text-[#d4847a] transition-colors">FAQs</a>
            </nav>
          </div>
        </div>
      </div>
      <div class="border-t border-[#f0e6e0]">
        <div class="container mx-auto py-4 px-5 flex items-center justify-between">
          <p class="text-neutral-400 text-sm">
            © 2026 Brand —
            <a href="https://www.linkedin.com/in/amanyhesham/" target="_blank" class="hover:text-[#d4847a] transition-colors">@AmanyHesham</a>
          </p>
        </div>
      </div>
    </footer>

    <script>
      function getWishlist() {
        return JSON.parse(localStorage.getItem("wishlistItems")) || [];
      }
      function saveWishlist(w) {
        localStorage.setItem("wishlistItems", JSON.stringify(w));
      }
      function getCart() {
        return JSON.parse(localStorage.getItem("cartItems")) || [];
      }
      function saveCart(c) {
        localStorage.setItem("cartItems", JSON.stringify(c));
      }

      const wishGrid = document.getElementById("wishGrid");
      const emptyWishEl = document.getElementById("emptyWish");
      const wishActions = document.getElementById("wishActions");
      const wishSubEl = document.getElementById("wishSubtitle");

      function buildStars(rating) {
        const r = Math.round(rating || 0);
        return Array.from(
          { length: 5 },
          (_, i) => `
    <svg class="w-3 h-3 ${i < r ? "text-[#d4847a]" : "text-neutral-200"}" fill="currentColor" viewBox="0 0 20 20">
      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
    </svg>`,
        ).join("");
      }

      function moveToCart(id) {
        let wishlist = getWishlist();
        const item = wishlist.find((i) => i.id === id);
        if (!item) return;
        const cart = getCart();
        const idx = cart.findIndex((i) => i.id === id);
        if (idx > -1) {
          cart[idx].qty += 1;
        } else {
          cart.push({ id: item.id, title: item.title, price: item.price, img: item.img, category: item.category, qty: 1 });
        }
        saveCart(cart);
        wishlist = wishlist.filter((i) => i.id !== id);
        saveWishlist(wishlist);
        updateBadges();
        renderWishlist();
        Swal.fire({ toast: true, position: "top-end", icon: "success", title: "Moved to cart!", text: item.title, showConfirmButton: false, timer: 2000, timerProgressBar: true, iconColor: "#d4847a" });
      }

      function removeFromWishlist(id) {
        let wishlist = getWishlist().filter((i) => i.id !== id);
        saveWishlist(wishlist);
        updateBadges();
        renderWishlist();
      }

      function clearWishlist() {
        Swal.fire({ title: "Clear wishlist?", icon: "warning", showCancelButton: true, confirmButtonColor: "#d4847a", cancelButtonColor: "#aaa", confirmButtonText: "Yes, clear it" }).then((r) => {
          if (r.isConfirmed) { saveWishlist([]); updateBadges(); renderWishlist(); }
        });
      }

      function updateBadges() {
        const cart = getCart();
        const wishlist = getWishlist();
        const cartEl = document.getElementById("cartBadge");
        const wishEl = document.getElementById("wishBadge");
        if (cartEl) cartEl.textContent = cart.reduce((s, i) => s + i.qty, 0);
        if (wishEl) wishEl.textContent = wishlist.length;
      }

      function renderWishlist() {
        const wishlist = getWishlist();
        wishGrid.innerHTML = "";
        if (wishlist.length === 0) {
          emptyWishEl.classList.remove("hidden");
          wishActions.classList.add("hidden");
          wishSubEl.textContent = "";
          return;
        }
        emptyWishEl.classList.add("hidden");
        wishActions.classList.remove("hidden");
        wishSubEl.textContent = `You have ${wishlist.length} saved item${wishlist.length > 1 ? "s" : ""}`;
        wishlist.forEach((item) => {
          const oldPrice = item.discount
            ? `<span class="text-xs text-neutral-400 line-through font-sans">$${(item.price / (1 - item.discount / 100)).toFixed(0)}</span>
         <span class="text-[0.65rem] text-[#d4847a] font-sans font-semibold bg-[#fdf0ed] px-2 py-0.5 rounded-full">-${item.discount}%</span>`
            : "";
          const card = document.createElement("div");
          card.className = "group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-300 border border-[#f0e6e0]";
          card.innerHTML = `
      <div class="relative overflow-hidden aspect-[3/4] bg-[#f5efed]">
        <img src="${item.img}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x530/f5efed/d4847a?text=Brand'" />
        <button onclick="removeFromWishlist(${item.id})" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center text-[#d4847a] hover:text-red-400 transition-colors shadow-sm">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div class="absolute bottom-0 left-0 right-0 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
          <button onclick="moveToCart(${item.id})" class="w-full bg-[#1a1a1a]/90 hover:bg-[#d4847a] text-white text-xs font-sans font-medium py-2.5 tracking-wide transition-colors duration-200">+ Move to Cart</button>
        </div>
      </div>
      <div class="p-3.5">
        <p class="text-[0.7rem] text-neutral-400 font-sans uppercase tracking-widest mb-0.5">${item.category || ""}</p>
        <h3 class="font-brand text-[1.05rem] text-neutral-800 leading-snug mb-1 truncate">${item.title}</h3>
        <div class="flex items-center gap-1 mb-2">
          <div class="flex gap-0.5">${buildStars(item.rating)}</div>
          <span class="text-[0.65rem] text-neutral-400 font-sans">(${item.reviews || 0})</span>
        </div>
        <div class="flex items-center gap-1.5 flex-wrap">
          <span class="font-brand text-[1.1rem] font-semibold text-neutral-800">$${item.price}</span>
          ${oldPrice}
        </div>
      </div>`;
          wishGrid.appendChild(card);
        });
      }

      const authBtn = document.getElementById("authBtn");
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (currentUser) authBtn.textContent = currentUser.name.split(" ")[0];
      authBtn.addEventListener("click", () => {
        if (JSON.parse(localStorage.getItem("currentUser"))) {
          Swal.fire({ title: "Log out?", icon: "question", showCancelButton: true, confirmButtonColor: "#d4847a", cancelButtonColor: "#aaa", confirmButtonText: "Yes, Logout" }).then((r) => {
            if (r.isConfirmed) {
              localStorage.removeItem("currentUser");
              localStorage.removeItem("cartItems");
              localStorage.removeItem("cartCount");
              localStorage.removeItem("wishlistItems");
              localStorage.removeItem("wishlistCount");
              location.reload();
            }
          });
        } else {
          window.location.href = "../Authentication/login.html";
        }
      });

      document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("navbar-default").classList.toggle("hidden");
      });

      updateBadges();
      renderWishlist();
    </script>
  </body>
</html>
