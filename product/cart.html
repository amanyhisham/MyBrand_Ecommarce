<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Brand — Cart</title>
    <link rel="icon" type="image/png" href="../Img/logo.png" />
    <script>
      tailwind.config = {
        theme: {
          extend: { fontFamily: { brand: ['"Cormorant Garamond"', "serif"] } },
        },
      };
    </script>
  </head>
  <body class="font-sans bg-[#faf8f7]">
    <!-- Navbar -->
    <nav
      class="bg-[#fdfcfb] fixed w-full z-20 top-0 start-0 border-b border-[#f0e6e0]"
    >
      <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-6 py-3"
      >
        <a href="../index.html" class="flex items-center space-x-3">
          <img src="../Img/logo.png" class="h-12" alt="Brand Logo" />
          <span
            class="font-brand font-medium text-[1.6rem] tracking-[0.12em] text-neutral-800"
            >Brand</span
          >
        </a>
        <button
          id="menu-toggle"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-neutral-500 rounded md:hidden hover:bg-neutral-100 focus:outline-none"
        >
          <svg
            class="w-6 h-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-width="1.5"
              d="M5 7h14M5 12h14M5 17h14"
            />
          </svg>
        </button>
        <div
          class="hidden w-full md:flex md:w-auto md:items-center md:gap-8"
          id="navbar-default"
        >
          <ul
            class="flex flex-col md:flex-row md:items-center md:gap-7 mt-4 md:mt-0"
          >
            <li>
              <a
                href="../index.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Home</a
              >
            </li>
            <li>
              <a
                href="#"
                class="font-brand font-medium text-[1.05rem] tracking-[0.08em] text-[#d4847a] block py-2 md:py-0"
                >About</a
              >
            </li>
            <li>
              <a
                href="../product/product.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Products</a
              >
            </li>
            <li>
              <a
                href="../sales/sales.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Sales</a
              >
            </li>
            <li>
              <a
                href="../ContactUs/contact.html"
                class="font-brand font-normal text-[1.05rem] tracking-[0.08em] text-neutral-700 hover:text-[#d4847a] transition-colors duration-200 block py-2 md:py-0"
                >Contact</a
              >
            </li>
          </ul>
          <div class="hidden md:block w-px h-6 bg-neutral-200"></div>
          <div class="flex items-center gap-5 mt-4 md:mt-0">
            <!-- Wishlist -->
            <a
              href="wishlist.html"
              class="relative text-neutral-500 hover:text-[#d4847a] transition-colors duration-200 cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-[22px] h-[22px]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              <span
                id="wishBadge"
                class="absolute -top-1.5 -right-1.5 bg-[#d4847a] text-white text-[0.6rem] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none"
                >0</span
              >
            </a>
            <!-- Cart -->
            <a
              href="cart.html"
              class="relative text-neutral-500 hover:text-[#d4847a] transition-colors duration-200 cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-[22px] h-[22px]"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.4"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"
                />
              </svg>
              <span
                id="cartBadge"
                class="absolute -top-1.5 -right-1.5 bg-[#d4847a] text-white text-[0.6rem] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none"
                >0</span
              >
            </a>
            <button
              id="authBtn"
              class="font-brand font-medium tracking-[0.1em] text-[0.95rem] border border-[#d4847a] text-[#d4847a] hover:bg-[#d4847a] hover:text-white transition-all duration-300 px-5 py-1.5 rounded-sm cursor-pointer"
            >
              Sign Up
            </button>
          </div>
        </div>
      </div>
    </nav>
    <div class="h-20"></div>

    <!-- Cart Content -->
    <div class="max-w-screen-lg mx-auto px-4 md:px-8 py-12">
      <h1
        class="font-brand font-semibold text-[2rem] sm:text-[2.5rem] tracking-wide text-neutral-800 mb-2"
      >
        Your Cart
      </h1>
      <p id="cartSubtitle" class="font-sans text-sm text-neutral-400 mb-10"></p>

      <!-- Empty state -->
      <div id="emptyCart" class="hidden text-center py-24">
        <svg
          class="w-16 h-16 text-neutral-200 mx-auto mb-4"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"
          />
        </svg>
        <p class="font-brand text-2xl text-neutral-400 mb-4">
          Your cart is empty
        </p>
        <a
          href="../product/product.html"
          class="inline-block font-brand font-medium tracking-[0.1em] text-[1rem] bg-[#d4847a] text-white hover:bg-[#c27268] transition-all duration-300 px-8 py-2.5 rounded-sm"
        >
          Start Shopping
        </a>
      </div>

      <!-- Cart items -->
      <div id="cartItems" class="flex flex-col gap-4"></div>

      <!-- Summary -->
      <div
        id="cartSummary"
        class="hidden mt-10 border-t border-[#f0e6e0] pt-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6"
      >
        <div>
          <p class="font-sans text-sm text-neutral-400 mb-1">
            Total items:
            <span id="totalItems" class="text-neutral-700 font-medium"></span>
          </p>
          <p class="font-brand text-[1.8rem] font-semibold text-neutral-800">
            Total: $<span id="totalPrice"></span>
          </p>
        </div>
        <div class="flex gap-3">
          <button
            onclick="clearCart()"
            class="font-brand font-medium tracking-[0.08em] text-[0.95rem] border border-neutral-300 text-neutral-500 hover:border-red-300 hover:text-red-400 transition-all duration-300 px-6 py-2.5 rounded-sm"
          >
            Clear Cart
          </button>
          <button
            class="font-brand font-medium tracking-[0.1em] text-[1rem] bg-[#d4847a] text-white hover:bg-[#c27268] transition-all duration-300 px-8 py-2.5 rounded-sm"
          >
            Checkout
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── Load cart from localStorage ──
      const cartItemsEl = document.getElementById("cartItems");
      const emptyCartEl = document.getElementById("emptyCart");
      const cartSummary = document.getElementById("cartSummary");
      const cartSubtitle = document.getElementById("cartSubtitle");

      let cart = JSON.parse(localStorage.getItem("cartItems")) || [];

      function renderCart() {
        cartItemsEl.innerHTML = "";

        if (cart.length === 0) {
          emptyCartEl.classList.remove("hidden");
          cartSummary.classList.add("hidden");
          cartSubtitle.textContent = "";
          document.getElementById("cartBadge").textContent = 0;
          return;
        }

        emptyCartEl.classList.add("hidden");
        cartSummary.classList.remove("hidden");
        cartSubtitle.textContent = `You have ${cart.length} item${cart.length > 1 ? "s" : ""} in your cart`;

        let total = 0;
        cart.forEach((item, index) => {
          total += item.price * item.qty;
          const el = document.createElement("div");
          el.className =
            "flex items-center gap-4 bg-white border border-[#f0e6e0] rounded-xl p-4 shadow-sm";
          el.innerHTML = `
      <img src="${item.img}" alt="${item.title}" class="w-20 h-24 object-cover rounded-lg bg-[#f5efed]"
        onerror="this.src='https://placehold.co/80x96/f5efed/d4847a?text=Brand'" />
      <div class="flex-1">
        <p class="text-[0.7rem] text-neutral-400 font-sans uppercase tracking-widest mb-0.5">${item.category || ""}</p>
        <h3 class="font-brand text-[1.1rem] text-neutral-800 leading-snug mb-1">${item.title}</h3>
        <p class="font-brand text-[1rem] font-semibold text-[#d4847a]">$${item.price}</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="changeQty(${index}, -1)" class="w-7 h-7 rounded-full border border-[#f0e6e0] text-neutral-500 hover:border-[#d4847a] hover:text-[#d4847a] transition-colors text-lg leading-none flex items-center justify-center">−</button>
        <span class="font-brand text-[1.1rem] w-6 text-center text-neutral-800">${item.qty}</span>
        <button onclick="changeQty(${index}, 1)"  class="w-7 h-7 rounded-full border border-[#f0e6e0] text-neutral-500 hover:border-[#d4847a] hover:text-[#d4847a] transition-colors text-lg leading-none flex items-center justify-center">+</button>
      </div>
      <div class="text-right min-w-[70px]">
        <p class="font-brand text-[1.1rem] font-semibold text-neutral-800">$${(item.price * item.qty).toFixed(2)}</p>
        <button onclick="removeItem(${index})" class="text-xs text-neutral-400 hover:text-red-400 transition-colors mt-1 font-sans">Remove</button>
      </div>
    `;
          cartItemsEl.appendChild(el);
        });

        document.getElementById("totalItems").textContent = cart.reduce(
          (s, i) => s + i.qty,
          0,
        );
        document.getElementById("totalPrice").textContent = total.toFixed(2);
        document.getElementById("cartBadge").textContent = cart.reduce(
          (s, i) => s + i.qty,
          0,
        );
        localStorage.setItem(
          "cartCount",
          JSON.stringify(cart.reduce((s, i) => s + i.qty, 0)),
        );
      }

      function changeQty(index, delta) {
        cart[index].qty += delta;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        localStorage.setItem("cartItems", JSON.stringify(cart));
        renderCart();
      }

      function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem("cartItems", JSON.stringify(cart));
        renderCart();
      }

      function clearCart() {
        Swal.fire({
          title: "Clear cart?",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#d4847a",
          cancelButtonColor: "#aaa",
          confirmButtonText: "Yes, clear it",
        }).then((r) => {
          if (r.isConfirmed) {
            cart = [];
            localStorage.setItem("cartItems", JSON.stringify([]));
            localStorage.setItem("cartCount", "0");
            renderCart();
          }
        });
      }

      // Auth
      const authBtn = document.getElementById("authBtn");
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (currentUser) authBtn.textContent = currentUser.name.split(" ")[0];
      authBtn.addEventListener("click", () => {
        if (JSON.parse(localStorage.getItem("currentUser"))) {
          Swal.fire({
            title: "Log out?",
            icon: "question",
            showCancelButton: true,
            confirmButtonColor: "#d4847a",
            cancelButtonColor: "#aaa",
            confirmButtonText: "Yes, Logout",
          }).then((r) => {
            if (r.isConfirmed) {
              // مسح كل حاجة
              localStorage.removeItem("currentUser");
              localStorage.removeItem("cartItems");
              localStorage.removeItem("cartCount");
              localStorage.removeItem("wishlistItems");
              localStorage.removeItem("wishlistCount");
              location.reload();
            }
          });
        } else {
          window.location.href = "../Authentication/login.html";
        }
      });

      // ── Sync wishlist & cart badges from localStorage ──
      function syncBadges() {
        const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
        const wishlistItems =
          JSON.parse(localStorage.getItem("wishlistItems")) || [];

        const cartCount = cartItems.reduce((s, i) => s + (i.qty || 1), 0);
        const wishlistCount = wishlistItems.length;

        document
          .querySelectorAll("#cartBadge")
          .forEach((el) => (el.textContent = cartCount));
        document
          .querySelectorAll("#wishBadge")
          .forEach((el) => (el.textContent = wishlistCount));
      }

      // Mobile menu
      document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("navbar-default").classList.toggle("hidden");
      });

      syncBadges();
      renderCart();
    </script>
  </body>
</html>
