<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Brand</title>
    <link rel="icon" type="image/png" href="../Img/logo.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brand: ['"Cormorant Garamond"', 'serif'] },
                    colors: { brand: '#d4847a' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex">

    <div class="w-full md:w-1/2 flex flex-col justify-center px-8 sm:px-16 py-12 bg-white">

        <h1 class="font-brand text-3xl font-medium text-gray-900 mb-1">Welcome back</h1>
        <p class="text-sm text-gray-400 mb-8">Sign in to your account to continue.</p>

        <form id="loginForm" class="space-y-4" action="#">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="hello@brand.com" required
                    class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="password" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer">
                    <input type="checkbox" class="accent-brand"> Remember me
                </label>
                <a href="forgetPassword.html" class="text-sm text-brand hover:underline">Forgot password?</a>
            </div>

            <button type="submit"
                class="w-full py-2.5 bg-brand hover:bg-[#b8685e] text-white font-brand text-lg font-semibold rounded-lg transition-colors">
                Log in
            </button>

            <p class="text-center text-sm text-gray-400">
                Don't have an account? <a href="register.html" class="text-brand hover:underline font-medium">Sign up</a>
            </p>

        </form>
    </div>

    <!-- RIGHT: Image -->
    <div class="hidden md:flex w-1/2 justify-center items-center">
        <img src="../Img/login.png" alt="" class="w-3/4 h-auto object-contain">
    </div>

    <script src="login.js">
         
    </script>

</body>
</html>
