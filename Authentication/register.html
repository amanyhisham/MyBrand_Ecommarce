<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Brand</title>
    <link rel="icon" type="image/png" href="../Img/logo.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brand: ['"Cormorant Garamond"', 'serif'] },
                    colors: { brand: '#d4847a' }
                }
            }
        }
    </script>
</head>
<body class="h-screen overflow-hidden flex">

    <!-- LEFT: Form -->
    <div class="w-full md:w-1/2 flex flex-col justify-center px-6 sm:px-10 py-8 bg-white">


        <h1 class="font-brand text-2xl font-medium text-gray-900 mb-1">Create an account</h1>
        <p class="text-sm text-gray-400 mb-6">Fill in your details to get started.</p>

        <form id="registerForm" class="space-y-4" action="#">

            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">First name</label>
                    <input id="firstName" type="text" placeholder="Sara" required
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Last name</label>
                    <input id="lastName" type="text" placeholder="Ahmed" required
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="hello@brand.com" required
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="password" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
                <input id="confirmPassword" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <div class="flex items-start gap-2 pt-1">
                <input id="terms" type="checkbox" class="mt-0.5 accent-brand">
                <label for="terms" class="text-sm text-gray-500">
                    I agree to the <a href="#" class="text-brand hover:underline">Terms</a> and <a href="#" class="text-brand hover:underline">Privacy Policy</a>
                </label>
            </div>

            <button type="submit"
                class="w-full py-2 bg-brand hover:bg-[#b8685e] text-white font-brand text-base font-semibold rounded-lg transition-colors">
                Create Account
            </button>

            <p class="text-center text-sm text-gray-400">
                Already have an account? <a href="login.html" class="text-brand hover:underline font-medium">Log in</a>
            </p>

        </form>
    </div>

    <!-- RIGHT: Image -->
    <div class="hidden md:flex w-1/2 justify-center items-center">
        <img src="../Img/register.png" alt="" class="w-3/4 h-auto object-contain">
    </div>

    <script src="register.js"></script>

</body>
</html>
