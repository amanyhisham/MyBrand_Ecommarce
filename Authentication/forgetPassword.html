<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Brand</title>
    <link rel="icon" type="image/png" href="../Img/logo.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { brand: ['"Cormorant Garamond"', 'serif'] },
                    colors: { brand: '#d4847a' }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex">

    <!-- LEFT: Form -->
    <div class="w-full md:w-1/2 flex flex-col justify-center px-8 sm:px-16 py-12 bg-white">

      

        <h1 class="font-brand text-3xl font-medium text-gray-900 mb-1">Reset your password</h1>
        <p class="text-sm text-gray-400 mb-8">Enter your email and choose a new password.</p>

        <form id="resetForm" class="space-y-4" action="#">

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="hello@brand.com" required
                    class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <!-- New Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input id="newPassword" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                <input id="confirmPassword" type="password" placeholder="••••••••" required
                    class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
            </div>

            <!-- Submit -->
            <button type="submit"
                class="w-full py-2.5 bg-brand hover:bg-[#b8685e] text-white font-brand text-lg font-semibold rounded-lg transition-colors">
                Reset Password
            </button>

            <p class="text-center text-sm text-gray-400">
                Remembered it? <a href="login.html" class="text-brand hover:underline font-medium">Sign in</a>
            </p>

        </form>
    </div>

    <!-- RIGHT: Image -->
    <div class="hidden md:flex w-1/2 justify-center items-center">
        <img src="../Img/login.png" alt="" class="w-3/4 h-auto object-contain">
    </div>

    <script src="forgetpassword.js">
      
    </script>

</body>
</html>
